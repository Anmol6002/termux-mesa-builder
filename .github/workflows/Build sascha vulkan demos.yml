name: Build Termux Package

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build sascha-vulkan (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [aarch64]

    steps:
      - name: Checkout local package source
        uses: actions/checkout@v4

      - name: Clone official termux-packages repo
        run: |
          git clone --depth 1 https://github.com/termux/termux-packages.git termux-packages

      - name: Setup package directory in build tree
        run: |
          mkdir -p termux-packages/packages/sascha-vulkan
          # Copy your build.sh and patch files into the termux-packages directory structure
          cp build.sh termux-packages/packages/sascha-vulkan/
          cp *.patch termux-packages/packages/sascha-vulkan/ || true

      - name: Build package with Termux Docker environment
        run: |
          cd termux-packages
          # -I flag automatically downloads prebuilt dependencies from Termux repositories
          # -f forces a rebuild of the target package
          # -a specifies the target compilation architecture
          ./scripts/run-docker.sh ./build-package.sh -I -f -a ${{ matrix.arch }} sascha-vulkan

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sascha-vulkan-${{ matrix.arch }}-debs
          path: termux-packages/debs/*.deb

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download compiled packages
        uses: actions/download-artifact@v4
        with:
          path: debs
          merge-multiple: true

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: debs/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
