name: Build Termux Mesa Freedreno

on:
  workflow_dispatch:
    inputs:
      repo_url:
        description: 'Mesa GitHub Repository (e.g. lfdevs/mesa-for-android-container)'
        required: true
        default: 'Anmol6002/mesa-for-android-container'
      branch:
        description: 'Branch name (e.g. adreno-main)'
        required: true
        default: 'dev/adreno-main'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    
      - name: Checkout termux-packages
        run: git clone --depth 1 https://github.com/termux/termux-packages.git

      - name: Setup custom Mesa source
        run: |
          cd termux-packages
          # 1. DELETE THE CONFLICTING PATCHES
          # These are already in the Anmol6002 source
          echo "Removing redundant Adreno patches..."
          rm -f packages/mesa/0016-unofficial_support_adreno_710_720_722.patch
          rm -f packages/mesa/0021-unofficial-support-adreno-810-825-829.patch
          rm -f packages/mesa/0020-unofficial-support-adreno-830.patch
          rm -f packages/mesa/0003-fix-for-anon-file.patch
          rm -f packages/mesa/0007-use-mtx_t-operations-in-turnip.patch
          rm -f packages/mesa/0019-UBWC_5-and-UBWC_6-support.patch
          rm -f packages/mesa/0013-detect-sve-sve2-support.patch
          rm -f packages/mesa/0017-preserve-egl-support-in-zink.patch
          rm -f packages/mesa/0018-disable-general-layout-in-zink-for-turnip.patch
          # Set URLs based on GitHub Action inputs
          REPO="${{ github.event.inputs.repo_url }}"
          BRANCH="${{ github.event.inputs.branch }}"
          TAR_URL="https://github.com/$REPO/archive/refs/heads/$BRANCH.tar.gz"
          
          echo "Downloading source to calculate SHA256..."
          wget -q "$TAR_URL" -O mesa.tar.gz
          SHA256=$(sha256sum mesa.tar.gz | awk '{print $1}')
          
          # GitHub tarballs extract into a folder named RepoName-BranchName
          REPO_NAME=$(basename $REPO)
          FOLDER_NAME="${REPO_NAME}-${BRANCH}"
          
          echo "Patching Termux build.sh to use custom source..."
          sed -i "s|^TERMUX_PKG_VERSION=.*|TERMUX_PKG_VERSION=26.2.0|g" packages/mesa/build.sh
          sed -i "s|^TERMUX_PKG_SRCURL=.*|TERMUX_PKG_SRCURL=$TAR_URL|g" packages/mesa/build.sh
          sed -i "s|^TERMUX_PKG_SHA256=.*|TERMUX_PKG_SHA256=$SHA256|g" packages/mesa/build.sh
          
          # Inject foldername override so Termux finds the extracted source
          sed -i "/^TERMUX_PKG_SHA256=/a TERMUX_PKG_FOLDERNAME=$FOLDER_NAME" packages/mesa/build.sh
          # CHANGE 2: Fix 'bsdtar' installation conflict by disabling libarchive programs
          sed -i '/TERMUX_PKG_SHA256=/a TERMUX_PKG_EXTRA_CONFIGURE_ARGS+=" -Dlibarchive:programs=false -Dlibarchive:install_static=false"' packages/mesa/build.sh
     
      - name: Inject Manual Logic Repairs
        run: |
          cd termux-packages/packages/mesa
          
          # Use a heredoc. Note: EOF must be flush with the left margin!
          cat >> build.sh <<'EOF'
          termux_step_post_get_source() {
          echo "Applying manual repairs for failed patches 0003, 0007..."

          # --- REPAIR 0007: Mutex Type Fix (Fixes the build error) ---
          # We use a global replace to catch all lines in the tu_shader.cc file
          if [ -f "src/freedreno/vulkan/tu_shader.cc" ]; then
          echo "Fixing mtx_t mismatch in tu_shader.cc..."
          sed -i 's/pthread_mutex_lock(&dev->pipeline_mutex)/mtx_lock(\&dev->pipeline_mutex)/g' src/freedreno/vulkan/tu_shader.cc
          sed -i 's/pthread_mutex_unlock(&dev->pipeline_mutex)/mtx_unlock(\&dev->pipeline_mutex)/g' src/freedreno/vulkan/tu_shader.cc
          fi
          if [ -f "src/vulkan/wsi/wsi_common_wayland.c" ]; then
          echo "Fixing mtx_t mismatch in wsi_common_wayland.c..."
          sed -i 's/pthread_mutex_lock(&chain->present_ids.lock)/mtx_lock(\&chain->present_ids.lock)/g' src/vulkan/wsi/wsi_common_wayland.c
          sed -i 's/pthread_mutex_unlock(&chain->present_ids.lock)/mtx_unlock(\&chain->present_ids.lock)/g' src/vulkan/wsi/wsi_common_wayland.c
          fi

          # --- REPAIR 0003: Anon-file Redirection ---
          # This exactly matches the logic in the patch you provided
          if [ -f "src/util/anon_file.c" ]; then
          echo "Repairing anon_file.c paths using $PREFIX placeholder..."
          sed -i 's|"/tmp/xdg-runtime-mesa-%ld"|"$PREFIX/tmp/xdg-runtime-mesa-%ld"|g' src/util/anon_file.c
          fi
          # 1. FIX PATCH 0017: Preserve Zink EGL Support (Removes the DRI3 warning/fallback)
          if [ -f "src/egl/drivers/dri2/platform_x11_dri3.c" ]; then
          sed -i '/DRI3: Failed to initialize/,/return false/ s/return false/return true/' src/egl/drivers/dri2/platform_x11_dri3.c
          fi
          if [ -f "src/egl/main/eglapi.c" ]; then
          sed -i 's/disp->Options.Zink = env && !strcmp(env, "zink")/disp->Options.Zink = !env || !strcmp(env, "zink")/' src/egl/main/eglapi.c
          fi
          # --- REPAIR 0018: Disable General Layout in Zink for Turnip ---
          if [ -f "src/gallium/drivers/zink/zink_screen.c" ]; then
          echo "Applying precise Patch 0018 logic to zink_screen.c..."
          # 1. Remove it from the block where it was set to 'true'
          sed -i '/case VK_DRIVER_ID_MESA_TURNIP:/d' src/gallium/drivers/zink/zink_screen.c
          # 2. Add a new block specifically for Turnip setting it to 'false' before the default case
          sed -i '/default:/i \   case VK_DRIVER_ID_MESA_TURNIP:\n      screen->driver_workarounds.general_layout = false;\n      break;' src/gallium/drivers/zink/zink_screen.c
          fi
          # --- REPAIR 0011: TLS Symbol Fix (Ensures driver loads on Android) ---
          if [ -f "src/gallium/targets/dri/dri.sym.in" ]; then
          echo "Applying TLS symbol repair (0011)..."
          sed -i 's/_mesa_glapi_tls_Context/__emutls_v._mesa_glapi_tls_Context/g' src/gallium/targets/dri/dri.sym.in
          sed -i 's/_mesa_glapi_tls_Dispatch/__emutls_v._mesa_glapi_tls_Dispatch/g' src/gallium/targets/dri/dri.sym.in
          fi
          # --- REPAIR 0013: SVE/SVE2 Detection logic for llvmpipe ---
          if [ -f "src/gallium/auxiliary/gallivm/lp_bld_misc.cpp" ]; then
          echo "Applying SVE detection repairs (0013)..."
          # Inject headers after existing include
          sed -i '/#include "lp_bld_debug.h"/a #if __has_include(<sys/auxv.h>)\n#include <sys/auxv.h>\n#define HAVE_SYS_AUXV 1\n#ifndef AT_HWCAP\n#define AT_HWCAP 16\n#endif\n#ifndef AT_HWCAP2\n#define AT_HWCAP2 26\n#endif\n#ifndef HWCAP_SVE\n#define HWCAP_SVE (1 << 22)\n#endif\n#ifndef HWCAP2_SVE2\n#define HWCAP2_SVE2 (1 << 1)\n#endif\n#endif' src/gallium/auxiliary/gallivm/lp_bld_misc.cpp
          # --- REPAIR 0013: SVE Detection (Logic) ---
          sed -i '/MAttrs.push_back("-lasx");/a #if DETECT_ARCH_AARCH64 && defined(HAVE_SYS_AUXV)\n   bool has_sve = getauxval(AT_HWCAP) & HWCAP_SVE;\n   bool has_sve2 = getauxval(AT_HWCAP2) & HWCAP2_SVE2;\n   MAttrs.push_back(has_sve ? "+sve" : "-sve");\n   MAttrs.push_back(has_sve2 ? "+sve2" : "-sve2");\n#endif\n   char *env_extra_mattrs = getenv("GALLIVM_EXTRA_MATTRS");\n   if (env_extra_mattrs != NULL) {\n      char *dup = strdup(env_extra_mattrs);\n      if (dup != NULL) {\n         char *state;\n         char *token = strtok_r(dup, ",", &state);\n         while (token) {\n            MAttrs.push_back(token);\n            token = strtok_r(NULL, ",", &state);\n         }\n         free(dup);\n      }\n   }' src/gallium/auxiliary/gallivm/lp_bld_misc.cpp
          fi
          # --- FIX MISSING EPOLL HEADERS (Always needed for Termux environment)
          if [ -f "src/util/os_file.c" ]; then
          echo "Fix epoll os_file.c error..."
          sed -i '1i #include <sys/epoll.h>' src/util/os_file.c
          fi 
          # --- REPAIR extra: FORCE VULKAN 1.3 VERSION (Based on your tu_device.cc) ---
          if [ -f "src/freedreno/vulkan/tu_device.cc" ]; then
          echo "Applying Master Repairs for Adreno 613 (Vulkan 1.3 Force) Bypassing Multiview requirement to unlock Vulkan 1.3..."
          # Force the version check to always follow the 'true' path (1.3+)
          sed -i 's/tu_has_multiview(pdevice) ?/true ?/g' src/freedreno/vulkan/tu_device.cc
          # Force the Vulkan 1.1 internal capability check to true
          sed -i 's/return tu_has_multiview(device);/return true;/' src/freedreno/vulkan/tu_device.cc
          fi
          }
          EOF
          
      - name: Build Mesa package
        run: |
          cd termux-packages
          # Start the build. Termux automatically pulls its Docker image and cross-compiles!
          ./scripts/run-docker.sh ./build-package.sh -a aarch64 -f -I -C mesa
      - name: Upload DEB packages
        uses: actions/upload-artifact@v4
        with:
          name: termux-mesa-debs
          path: termux-packages/output/*.deb
          
