name: Build Package sascha-vulkan-demos

on:
  workflow_dispatch:

jobs:
  build:
    name: Build sascha-vulkan-demos (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [aarch64]

    steps:
      - name: Checkout local package source
        uses: actions/checkout@v4

      - name: Clone official termux-packages repo
        run: |
          git clone --depth 1 https://github.com/termux/termux-packages.git termux-packages

      - name: Setup package directory in build tree
        run: |
          mkdir -p termux-packages/x11-packages/sascha-vulkan-demos
          # Copy your build.sh and patch files into the x11-packages directory structure
          cp build.sh termux-packages/x11-packages/sascha-vulkan-demos/
          cp *.patch termux-packages/x11-packages/sascha-vulkan-demos/ || true

      - name: Build package with Termux Docker environment
        run: |
          cd termux-packages
          # -I flag automatically downloads prebuilt dependencies from Termux repositories
          # -f forces a rebuild of the target package
          # -a specifies the target compilation architecture
          ./scripts/run-docker.sh ./build-package.sh -I -f -a ${{ matrix.arch }} sascha-vulkan-demos

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sascha-vulkan-demos-${{ matrix.arch }}-debs
          path: termux-packages/output/*.deb
