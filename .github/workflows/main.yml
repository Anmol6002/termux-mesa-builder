name: Build Termux Mesa

on:
  workflow_dispatch:
    inputs:
      repo_url:
        description: 'Mesa GitHub Repository (e.g. lfdevs/mesa-for-android-container)'
        required: true
        default: 'Anmol6002/mesa-for-android-container'
      branch:
        description: 'Branch name (e.g. adreno-main)'
        required: true
        default: 'dev/adreno-main'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    
      - name: Checkout termux-packages
        run: git clone --depth 1 https://github.com/termux/termux-packages.git

      - name: Setup custom Mesa source
        run: |
          cd termux-packages
          
          
          # Set URLs based on GitHub Action inputs
          REPO="${{ github.event.inputs.repo_url }}"
          BRANCH="${{ github.event.inputs.branch }}"
          TAR_URL="https://github.com/$REPO/archive/refs/heads/$BRANCH.tar.gz"
          
          echo "Downloading source to calculate SHA256..."
          wget -q "$TAR_URL" -O mesa.tar.gz
          SHA256=$(sha256sum mesa.tar.gz | awk '{print $1}')
          
          # GitHub tarballs extract into a folder named RepoName-BranchName
          REPO_NAME=$(basename $REPO)
          FOLDER_NAME="${REPO_NAME}-${BRANCH}"
          
          echo "Patching Termux build.sh to use custom source..."
          sed -i "s|^TERMUX_PKG_VERSION=.*|TERMUX_PKG_VERSION=26.2.0|g" packages/mesa/build.sh
          sed -i "s|^TERMUX_PKG_SRCURL=.*|TERMUX_PKG_SRCURL=$TAR_URL|g" packages/mesa/build.sh
          sed -i "s|^TERMUX_PKG_SHA256=.*|TERMUX_PKG_SHA256=$SHA256|g" packages/mesa/build.sh
          
          # Inject foldername override so Termux finds the extracted source
          sed -i "/^TERMUX_PKG_SHA256=/a TERMUX_PKG_FOLDERNAME=$FOLDER_NAME" packages/mesa/build.sh

      # NEW LOGIC: Test every patch on the lfdevs codebase, dynamically dropping broken lines
      - name: Intelligently Audit & Filter Patches
        run: |
          cd termux-packages
          
          # Extract the lfdevs source tarball temporarily to test patches on it
          mkdir -p test_extract
          tar -xf mesa.tar.gz -C test_extract
          SRC_DIR=$(ls -d test_extract/*)
          
          echo "Auditing patches inside packages/mesa/..."
          cd packages/mesa
          
          # Loop through each patch file alphabetically
          for patchfile in *.patch; do
            [ -e "$patchfile" ] || continue
            echo "------------------------------------------------"
            echo "Testing: $patchfile"
            
            # Simulate patch application using dry-run on the extracted lfdevs codebase
            if patch --dry-run -p1 -d "../../$SRC_DIR" < "$patchfile" > /dev/null 2>&1; then
              echo "✅ CLEAN: Patch applies safely. Keeping it."
            else
              echo "❌ CONFLICT: Patch failed dry-run. Likely natively handled by lfdevs source code."
              echo "Removing $patchfile to prevent build failure..."
              rm "$patchfile"
            fi
          done
          
          # Clean up temporary directories
          cd ../..
          rm -rf test_extract

      # FIX: Pass continuous build parameters via Termux's environment variable collector
      - name: Inject Global Epoll Headers for Clang
        run: |
          cd termux-packages
          
          # We use sed to append our configuration flags directly to Termux's variable collector 
          # inside build.sh instead of mapping fragile shell functions.
          echo "Injecting -include sys/epoll.h directly into C/C++ compilation environment..."
          sed -i '/TERMUX_PKG_SHA256=/a TERMUX_PKG_EXTRA_CONFIGURE_ARGS+=" -Dc_args='\''-include sys/epoll.h'\'' -Dcpp_args='\''-include sys/epoll.h'\''"' packages/mesa/build.sh
          
      - name: Build Mesa package
        run: |
          cd termux-packages
          # Start the build. Termux automatically pulls its Docker image and cross-compiles!
          ./scripts/run-docker.sh ./build-package.sh -a aarch64 -f -I mesa

      - name: Upload DEB packages
        uses: actions/upload-artifact@v4
        with:
          name: termux-mesa-debs
          path: termux-packages/output/*.deb
